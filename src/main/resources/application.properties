# =============================================
#  Application
# =============================================
spring.application.name=booking.management
server.port=8080

# =============================================
#  Database — PostgreSQL
# =============================================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/event_booking_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:mdyfann}
spring.datasource.driver-class-name=org.postgresql.Driver

# =============================================
#  JPA / Hibernate
# =============================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# =============================================
#  Flyway
# =============================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# =============================================
#  JWT
# =============================================
app.jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# =============================================
#  Logging
# =============================================
logging.level.root=INFO
logging.level.com.agora=DEBUG
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN

# =============================================
#  Swagger
# =============================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui